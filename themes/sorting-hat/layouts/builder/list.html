{{ define "main" }}
<div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
  <div>
    <h1 id="builder-title" class="h3 mb-1">Loading…</h1>
    <p id="builder-subtitle" class="text-muted mb-0"></p>
  </div>
  <a href="{{ "/" | relURL }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div id="builder-error" class="alert alert-danger d-none"></div>

<div id="builder-content" class="d-none">

  <div class="card mb-3">
    <div class="card-body">
      <h2 class="h6 text-muted text-uppercase mb-3">Configure</h2>
      <div class="row g-3">
        <div class="col-sm-4">
          <label for="cfg-multiplier" class="form-label">How many to open</label>
          <input id="cfg-multiplier" type="number" class="form-control" value="1" min="1" step="1">
          <div class="form-text" id="cfg-multiplier-hint"></div>
        </div>
        <div class="col-sm-4">
          <label for="cfg-price-strategy" class="form-label">Listing price</label>
          <select id="cfg-price-strategy" class="form-select">
            <option value="market" selected>= TCG Market Price</option>
            <option value="market-pct">TCG Market × multiplier</option>
          </select>
        </div>
        <div class="col-sm-4" id="cfg-price-pct-wrap" hidden>
          <label for="cfg-price-pct" class="form-label">Multiplier (%)</label>
          <input id="cfg-price-pct" type="number" class="form-control" value="100" min="1" step="1">
        </div>
        <div class="col-sm-4 d-flex align-items-end">
          <button id="btn-recalc" type="button" class="btn btn-outline-secondary w-100">
            Recalculate
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped mb-0 align-middle">
          <thead class="table-dark">
            <tr>
              <th style="width: 6rem">Rarity</th>
              <th style="width: 4rem">No.</th>
              <th>Name</th>
              <th class="text-end" style="width: 7rem">Market</th>
              <th class="text-end" style="width: 8rem">List Price</th>
              <th class="text-end" style="width: 7rem">Add Qty</th>
            </tr>
          </thead>
          <tbody id="card-rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="builder-summary" class="builder-summary py-3 d-none">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div class="small">
      <span class="me-3"><strong id="sum-cards">0</strong> unique cards</span>
      <span class="me-3"><strong id="sum-qty">0</strong> total qty</span>
      <span class="me-3">Sum market: <strong id="sum-market">$0.00</strong></span>
      <span>Sum listed: <strong id="sum-listed">$0.00</strong></span>
    </div>
    <div class="d-flex gap-2">
      <button id="btn-csv" class="btn btn-success" disabled>
        <i class="bi bi-download"></i> Download CSV
      </button>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script src="{{ "js/csv.js" | relURL }}"></script>
<script src="{{ "js/builder.js" | relURL }}"></script>
{{ end }}
