{{ define "main" }}
<div class="picker">
  <div class="picker-header mb-4">
    <h1 class="h3 mb-1">The Sorting Hat</h1>
    <p class="text-muted mb-0">
      Pick a sealed product, configure your listings, and download a TCGPlayer
      mass-upload CSV pre-populated with every card it contains.
    </p>
  </div>

  <nav id="picker-breadcrumb" class="picker-breadcrumb mb-3 d-none" aria-label="Selection"></nav>

  <section class="picker-step" data-step="game">
    <h2 class="h6 text-muted text-uppercase mb-3">1. Game</h2>
    <div id="picker-games" class="row g-3"></div>
  </section>

  <section class="picker-step mt-4 d-none" data-step="set">
    <h2 class="h6 text-muted text-uppercase mb-3">2. Set</h2>
    <div id="picker-sets" class="row g-3"></div>
  </section>

  <section class="picker-step mt-4 d-none" data-step="product">
    <h2 class="h6 text-muted text-uppercase mb-3">3. Product</h2>
    <div id="picker-products" class="row g-3"></div>
  </section>

  <div class="picker-footer mt-4 d-none" id="picker-footer">
    <button id="picker-go" class="btn btn-primary btn-lg" disabled>
      Open builder <i class="bi bi-arrow-right"></i>
    </button>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script src="{{ "js/picker.js" | relURL }}"></script>
{{ end }}
